<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flow Field</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #05050a;
    overflow: hidden;
    cursor: crosshair;
  }
  canvas { display: block; }
  #hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45);
    font: 13px system-ui, sans-serif;
    letter-spacing: 0.03em;
    pointer-events: none;
    transition: opacity 1s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">move your mouse · click to burst · press R to change colors</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let width, height, cols, rows;
const scale = 20; // grid cell size for the flow field

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  cols = Math.ceil(width / scale) + 2;
  rows = Math.ceil(height / scale) + 2;
}
window.addEventListener('resize', resize);
resize();

// fade the hint after a few seconds
setTimeout(() => document.getElementById('hint').style.opacity = 0, 4000);

let mouse = { x: width / 2, y: height / 2, active: false };
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('mouseleave', () => mouse.active = false);

// color palettes to cycle through with 'R'
const palettes = [
  ['#ff2d78', '#ff9d3c', '#3cffd6'],
  ['#7c4dff', '#00e5ff', '#ff4d9d'],
  ['#39ff14', '#00c2ff', '#fffb38'],
  ['#ff6b6b', '#feca57', '#48dbfb'],
];
let paletteIndex = 0;
window.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'r') {
    paletteIndex = (paletteIndex + 1) % palettes.length;
  }
});

function pickColor() {
  const p = palettes[paletteIndex];
  return p[Math.floor(Math.random() * p.length)];
}

let time = 0;

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.speed = 0.6 + Math.random() * 1.4;
    this.color = pickColor();
    this.life = 0;
    this.maxLife = 200 + Math.random() * 300;
  }
  angleAt(x, y) {
    // noise-ish field made from layered sine waves, warped by the mouse
    const nx = x / 220, ny = y / 220;
    let a = Math.sin(nx + time) + Math.cos(ny - time * 0.8) + Math.sin((nx + ny) * 1.6 + time * 0.5);
    if (mouse.active) {
      const dx = x - mouse.x, dy = y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 0.001;
      const pull = Math.max(0, 1 - dist / 380);
      a += Math.atan2(dy, dx) * pull * 1.8;
    }
    return a * Math.PI;
  }
  update() {
    const angle = this.angleAt(this.x, this.y);
    this.x += Math.cos(angle) * this.speed;
    this.y += Math.sin(angle) * this.speed;
    this.life++;
    if (this.x < 0 || this.x > width || this.y < 0 || this.y > height || this.life > this.maxLife) {
      this.reset();
    }
  }
}

const particles = [];
const PARTICLE_COUNT = 1400;
for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

// bursts triggered by clicks
const bursts = [];
window.addEventListener('click', e => {
  for (let i = 0; i < 60; i++) {
    bursts.push({
      x: e.clientX,
      y: e.clientY,
      angle: Math.random() * Math.PI * 2,
      speed: 1 + Math.random() * 5,
      life: 0,
      color: pickColor(),
    });
  }
});

function fadeBackground() {
  ctx.fillStyle = 'rgba(5, 5, 10, 0.06)';
  ctx.fillRect(0, 0, width, height);
}

function drawParticles() {
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    p.update();
    const alpha = 1 - p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(alpha * 0.8, 0);
    ctx.fillRect(p.x, p.y, 1.6, 1.6);
  }
  ctx.globalAlpha = 1;
}

function drawBursts() {
  for (let i = bursts.length - 1; i >= 0; i--) {
    const b = bursts[i];
    b.x += Math.cos(b.angle) * b.speed;
    b.y += Math.sin(b.angle) * b.speed;
    b.speed *= 0.96;
    b.life++;
    const alpha = 1 - b.life / 60;
    if (alpha <= 0) { bursts.splice(i, 1); continue; }
    ctx.fillStyle = b.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

function loop() {
  time += 0.0032;
  fadeBackground();
  drawParticles();
  drawBursts();
  requestAnimationFrame(loop);
}

// initial black fill so the fade-trail effect starts clean
ctx.fillStyle = '#05050a';
ctx.fillRect(0, 0, width, height);
loop();
</script>
</body>
</html>
